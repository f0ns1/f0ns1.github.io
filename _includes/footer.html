<div class="footer-container {% if site.resume_layout == 'split' %}container-fluid{% else %}container{% endif %}">
  <p>

    <a href="#" data-email-b64="{{ site.email | escape }}" class="email-decode" target="_blank"></a>

      &nbsp;- {{ site.references_title | default: "References on request" }}
    {%- endif -%}
  </p>
</div>
